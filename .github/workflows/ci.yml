name: CI

# Standalone CI for the tamandua-agent mirror. Derived from the monorepo
# pipeline with paths relative to the repo root (no working-directory).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev pkg-config libssl-dev build-essential

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libpcap

      - name: Setup Windows SDK
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  cross:
    name: Cross Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            features: ""
          - target: aarch64-unknown-linux-gnu
            features: "--no-default-features --features compression"
          - target: aarch64-unknown-linux-musl
            features: "--no-default-features --features compression"
          - target: armv7-unknown-linux-gnueabihf
            features: "--no-default-features"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build ${{ matrix.target }}
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          CROSS_CONFIG: Cross.toml

  macos-arm:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Test
        run: cargo test --release --target aarch64-apple-darwin

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: cargo audit
        run: cargo audit
        continue-on-error: true
