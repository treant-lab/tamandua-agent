name: CI

# Standalone CI for the tamandua-agent mirror. Derived from the monorepo
# pipeline with paths relative to the repo root (no working-directory).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==============================================================================
  # BUILD & TEST - Multi-OS Matrix
  # ==============================================================================
  agent-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-suffix: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev pkg-config libssl-dev build-essential

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libpcap

      - name: Setup Windows SDK
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (lint)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (debug)
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: tamandua-agent-${{ matrix.artifact-suffix }}
          path: |
            target/release/tamandua-agent${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 7

  # ==============================================================================
  # CROSS-COMPILATION - Linux musl & ARM targets
  # ==============================================================================
  agent-cross:
    name: Cross Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl (static binary for containers)
          - target: x86_64-unknown-linux-musl
            features: ""

          # Linux ARM64 GNU (AWS Graviton, Ampere, generic ARM64 servers)
          - target: aarch64-unknown-linux-gnu
            features: "--no-default-features --features compression"

          # Linux ARM64 musl (Alpine containers, fully static)
          - target: aarch64-unknown-linux-musl
            features: "--no-default-features --features compression"

          # Linux ARMv7 (Raspberry Pi 3/4 in 32-bit mode)
          - target: armv7-unknown-linux-gnueabihf
            features: "--no-default-features"

          # Linux ARMv6 (Raspberry Pi Zero/1)
          - target: armv6-unknown-linux-gnueabihf
            features: "--no-default-features"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for ${{ matrix.target }}
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          CROSS_CONFIG: Cross.toml

      - name: Upload cross-compiled binary
        uses: actions/upload-artifact@v4
        with:
          name: tamandua-agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tamandua-agent
          retention-days: 7

  # ==============================================================================
  # APPLE SILICON - Native ARM64 Build
  # ==============================================================================
  agent-macos-arm:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-14  # M1/M2 runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build for Apple Silicon
        run: cargo build --release --target aarch64-apple-darwin

      - name: Run tests on ARM64
        run: cargo test --release --target aarch64-apple-darwin

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tamandua-agent-macos-aarch64
          path: target/aarch64-apple-darwin/release/tamandua-agent
          retention-days: 7

  # ==============================================================================
  # SECURITY AUDIT
  # ==============================================================================
  agent-security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
