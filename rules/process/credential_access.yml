# Credential Access Detection Rules
# MITRE ATT&CK Tactic: TA0006 - Credential Access

version: "1.0"
metadata:
  author: Tamandua Security Team
  description: Detection rules for credential access and theft techniques
  last_updated: "2024-01-15"
  references:
    - https://attack.mitre.org/tactics/TA0006/

rules:
  # ==========================================================================
  # Credential Dumping Tools
  # ==========================================================================

  - id: CRED-001
    name: Mimikatz Execution Detected
    description: Detects execution of Mimikatz credential dumping tool
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003, T1003.001]
    conditions:
      any:
        - process.name:
            contains: [mimikatz, mimilib, mimilsa]
        - process.cmdline:
            contains: [sekurlsa::, lsadump::, kerberos::list, crypto::cng, vault::cred, dpapi::, privilege::debug, token::elevate]
        - process.sha256:
            in:
              - e2e8c2c5b1a4d3f6e7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0
              # Add known Mimikatz hashes here
    response:
      - alert
      - kill_process
      - quarantine_file
      - submit_sample
      - notify_soc
    tags: [mimikatz, credential-theft, high-confidence]
    false_positives:
      - Legitimate security assessments
      - Penetration testing tools
    references:
      - https://attack.mitre.org/software/S0002/
    confidence: 0.95

  - id: CRED-002
    name: LaZagne Credential Harvester
    description: Detects LaZagne password recovery tool
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003, T1555]
    conditions:
      any:
        - process.name:
            contains: lazagne
        - process.cmdline:
            contains: [lazagne, "-all", "browsers", "sysadmin", "databases", "memory"]
    response:
      - alert
      - kill_process
      - quarantine_file
    tags: [lazagne, credential-theft]
    confidence: 0.95

  - id: CRED-003
    name: ProcDump LSASS Dumping
    description: Detects ProcDump being used to dump LSASS process memory
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.001]
    conditions:
      all:
        - process.name:
            contains: procdump
        - process.cmdline:
            contains: [lsass, "-ma", "-accepteula"]
    response:
      - alert
      - kill_process
      - collect_evidence
    tags: [procdump, lsass-dump]
    confidence: 0.90

  - id: CRED-004
    name: Comsvcs.dll MiniDump Credential Theft
    description: Detects use of comsvcs.dll MiniDump to dump LSASS
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.001]
    conditions:
      all:
        - process.name:
            ends_with: rundll32.exe
        - process.cmdline:
            contains: [comsvcs, MiniDump, "#24"]
    response:
      - alert
      - kill_process
    tags: [comsvcs, lsass-dump, lolbas]
    confidence: 0.95

  - id: CRED-005
    name: Secretsdump Remote Credential Extraction
    description: Detects Impacket secretsdump execution
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.002, T1003.003, T1003.006]
    conditions:
      any:
        - process.name:
            contains: secretsdump
        - process.cmdline:
            contains: [secretsdump, "-hashes", "-sam", "-ntds", "-outputfile"]
    response:
      - alert
      - kill_process
      - isolate_host
    tags: [impacket, secretsdump, dcsync]
    confidence: 0.95

  - id: CRED-006
    name: Rubeus Kerberos Attacks
    description: Detects Rubeus Kerberos attack tool
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1558.003, T1550.003, T1558.004]
    conditions:
      any:
        - process.name:
            contains: rubeus
        - process.cmdline:
            contains: [rubeus, kerberoast, asreproast, s4u, ptt, harvest, tgtdeleg, "ticket::"]
    response:
      - alert
      - kill_process
      - notify_soc
    tags: [rubeus, kerberos, golden-ticket]
    confidence: 0.95

  - id: CRED-007
    name: Kekeo Kerberos Exploitation
    description: Detects Kekeo Kerberos exploitation tool
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1558]
    conditions:
      any:
        - process.name:
            contains: kekeo
        - process.cmdline:
            contains: [kekeo, tgt::ask, tgt::renew, misc::skeleton]
    response:
      - alert
      - kill_process
    tags: [kekeo, kerberos]
    confidence: 0.95

  - id: CRED-008
    name: SAM Registry Dump via Reg.exe
    description: Detects SAM/SYSTEM/SECURITY registry hive dumping
    category: process
    severity: high
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.002]
    conditions:
      all:
        - process.name:
            ends_with: reg.exe
        - process.cmdline:
            regex: (?i)save.*\\\\(sam|system|security)
    response:
      - alert
      - kill_process
    tags: [registry-dump, sam-dump]
    false_positives:
      - Legitimate backup operations
    confidence: 0.85

  - id: CRED-009
    name: Credential Manager Enumeration
    description: Detects enumeration of stored credentials via cmdkey
    category: process
    severity: medium
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1555.004]
    conditions:
      all:
        - process.name:
            ends_with: cmdkey.exe
        - process.cmdline:
            contains: /list
    response:
      - alert
    tags: [cmdkey, credential-enum]
    false_positives:
      - Legitimate administrative tasks
    confidence: 0.70

  - id: CRED-010
    name: VaultCmd Credential Access
    description: Detects credential vault enumeration
    category: process
    severity: medium
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1555.004]
    conditions:
      all:
        - process.name:
            ends_with: vaultcmd.exe
        - process.cmdline:
            contains: [/list, /listcreds]
    response:
      - alert
    tags: [vaultcmd, credential-enum]
    confidence: 0.70

  # ==========================================================================
  # Browser Credential Theft
  # ==========================================================================

  - id: CRED-011
    name: Browser Password Extraction Tools
    description: Detects tools used to extract browser passwords
    category: process
    severity: high
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1555.003]
    conditions:
      any:
        - process.name:
            contains: [webbrowserpassview, chromepass, firefoxpassword, passwordfox, ie passview]
        - process.cmdline:
            contains: ["Login Data", "logins.json", "signons.sqlite"]
    response:
      - alert
      - kill_process
    tags: [browser-credentials]
    confidence: 0.90

  - id: CRED-012
    name: Chrome Cookie/Password Database Access
    description: Detects direct access to Chrome credential storage
    category: process
    severity: high
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1539, T1555.003]
    conditions:
      any:
        - process.cmdline:
            contains:
              - "\\Google\\Chrome\\User Data\\Default\\Login Data"
              - "\\Google\\Chrome\\User Data\\Default\\Cookies"
              - "\\Google\\Chrome\\User Data\\Local State"
    response:
      - alert
    tags: [chrome, browser-theft]
    false_positives:
      - Chrome browser itself
      - Legitimate backup software
    confidence: 0.75

  # ==========================================================================
  # NTDS.dit Extraction
  # ==========================================================================

  - id: CRED-013
    name: NTDS.dit Shadow Copy Access
    description: Detects ntdsutil or vssadmin being used to access NTDS.dit
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.003]
    conditions:
      any:
        - process.cmdline:
            contains: [ntdsutil, "activate instance ntds", "ifm", "create full"]
        - process.cmdline:
            regex: (?i)vssadmin.*create.*shadow
    response:
      - alert
      - kill_process
      - notify_soc
    tags: [ntds, shadow-copy, ad-credential-theft]
    false_positives:
      - Legitimate AD backup operations
    confidence: 0.90

  - id: CRED-014
    name: DCSync Attack Indicators
    description: Detects DCSync-style replication requests
    category: process
    severity: critical
    enabled: true
    mitre:
      tactics: [credential-access]
      techniques: [T1003.006]
    conditions:
      any:
        - process.cmdline:
            contains: [dcsync, "lsadump::dcsync", "/user:krbtgt", "DRSUAPI"]
    response:
      - alert
      - isolate_host
      - notify_soc
    tags: [dcsync, domain-admin]
    confidence: 0.95

  # ==========================================================================
  # Keylogging
  # ==========================================================================

  - id: CRED-015
    name: Common Keylogger Indicators
    description: Detects common keylogging tools and techniques
    category: process
    severity: high
    enabled: true
    mitre:
      tactics: [credential-access, collection]
      techniques: [T1056.001]
    conditions:
      any:
        - process.name:
            contains: [keylogger, keyhook, inputcapture]
        - process.cmdline:
            contains: [GetAsyncKeyState, SetWindowsHookEx, LowLevelKeyboardProc]
    response:
      - alert
      - kill_process
    tags: [keylogger, input-capture]
    confidence: 0.85
